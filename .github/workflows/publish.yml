name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      dist_tag:
        description: npm dist-tag to publish under
        required: true
        default: alpha
        type: choice
        options:
          - alpha
          - latest
  repository_dispatch:
    types:
      - publish-npm

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: npm-publish
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Read package metadata
        id: package
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Resolve npm dist-tag
        id: dist-tag
        env:
          WORKFLOW_DIST_TAG: ${{ inputs.dist_tag }}
          DISPATCH_DIST_TAG: ${{ github.event.client_payload.dist_tag }}
        run: |
          dist_tag="${WORKFLOW_DIST_TAG:-${DISPATCH_DIST_TAG:-alpha}}"
          case "$dist_tag" in
            alpha|latest)
              echo "value=$dist_tag" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unsupported npm dist-tag: $dist_tag"
              exit 1
              ;;
          esac

      - name: Check package version is not published
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version --json > /tmp/npm-version.json 2>/dev/null; then
            echo "::error::${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} is already published"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm
        env:
          NPM_DIST_TAG: ${{ steps.dist-tag.outputs.value }}
        run: npm publish --access public --tag "$NPM_DIST_TAG"
